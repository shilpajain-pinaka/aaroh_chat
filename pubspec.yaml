name: aaroh_chat
description: >
  Flutter chat SDK by Aaroh for AI-powered conversations, featuring built-in NLP, Claude API integration, and branding options.

version: 1.2.1+1
homepage: https://github.com/shilpajain-pinaka/aaroh_chat
repository: https://github.com/shilpajain-pinaka/aaroh_chat
issue_tracker: https://github.com/shilpajain-pinaka/aaroh_chat/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  intl: ^0.20.2
  http: ^1.6.0
  speech_to_text: ^7.0.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  # No assets needed — SDK is code-only
